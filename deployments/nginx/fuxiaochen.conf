# fuxiaochen.com 的生产反向代理配置，面向 Next.js standalone 服务。
#
# 这个文件需要被包含在 Nginx 的 http 上下文中，例如：
# - /etc/nginx/conf.d/fuxiaochen.conf
# - 被主 nginx.conf include 的 sites-enabled 文件
#
# 上游应用建议只绑定本机，例如 Docker 端口映射使用
# 127.0.0.1:3000:3000，对公网只暴露 Nginx。

# 复用到 Next standalone 进程的上游连接。该项目的生产入口来自
# .next/standalone 中的 node server.js，并监听 3000 端口。
upstream fuxiaochen_next {
  server 127.0.0.1:3000;
  keepalive 32;
}

# Nginx 侧静态资源缓存池，只用于 /_next/static/ 下的不可变构建产物。
# proxy_cache_path 只能写在 http 上下文，不能放进 server 或 location。
proxy_cache_path /var/cache/nginx/fuxiaochen-next-static
  levels=1:2
  keys_zone=fuxiaochen_next_static:20m
  max_size=512m
  inactive=30d
  use_temp_path=off;

# 所有 HTTP 请求统一跳转到规范 HTTPS 域名。
server {
  listen 80;
  server_name fuxiaochen.com www.fuxiaochen.com;

  return 301 https://fuxiaochen.com$request_uri;
}

# 保留 www 可访问性，但把 fuxiaochen.com 作为唯一规范域名。
# BETTER_AUTH_URL 与 NEXT_PUBLIC_SITE_URL 应和这个规范 origin 保持一致。
server {
  listen 443 ssl http2;
  server_name www.fuxiaochen.com;

  ssl_certificate /root/my-projects/ssl/fuxiaochen.crt;
  ssl_certificate_key /root/my-projects/ssl/fuxiaochen.key;

  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  return 301 https://fuxiaochen.com$request_uri;
}

# 主 HTTPS 虚拟主机。
server {
  listen 443 ssl http2;
  server_name fuxiaochen.com;

  access_log /var/log/nginx/web_fuxiaochen_access.log;
  error_log /var/log/nginx/web_fuxiaochen_error.log;

  ssl_certificate /root/my-projects/ssl/fuxiaochen.crt;
  ssl_certificate_key /root/my-projects/ssl/fuxiaochen.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # 这些安全响应头会在带 add_header 的 location 里重复声明。
  # Nginx 在子级声明 add_header 后不会继续继承父级 add_header。
  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # 当前应用主要是 JSON CRUD 接口，没有直传大文件的站内路由。
  # 后续新增上传接口时，再按实际上传大小调整 client_max_body_size。
  client_max_body_size 10m;
  large_client_header_buffers 4 16k;

  # 在边缘压缩文本响应。Next 的 JS/CSS 构建产物和 JSON 接口响应收益最大。
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Next standalone 应用的通用代理设置。
  #
  # 当前项目没有 WebSocket 或 SSE 常驻连接，所以不要全局发送
  # Connection: upgrade；普通 HTTP keepalive 更适合这里。
  #
  # X-Forwarded-* 头对 Better Auth 回调、安全 Cookie、真实客户端 IP
  # 判断都很关键，必须让应用看到公网 HTTPS origin，而不是 127.0.0.1。
  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Port 443;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_redirect off;
  proxy_buffering on;
  proxy_request_buffering on;
  proxy_connect_timeout 10s;
  proxy_read_timeout 60s;
  proxy_send_timeout 60s;

  # Next 构建产物：JS、CSS、next/font 输出和其他带哈希的静态资源。
  # 文件名包含内容哈希，适合长期缓存。X-Cache-Status 方便用 curl
  # 观察第一次 MISS、后续 HIT。
  location ^~ /_next/static/ {
    access_log off;
    proxy_pass http://fuxiaochen_next;

    proxy_cache fuxiaochen_next_static;
    proxy_cache_valid 200 365d;
    proxy_cache_lock on;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

    proxy_ignore_headers Set-Cookie;
    proxy_hide_header Set-Cookie;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Cache-Status $upstream_cache_status always;
  }

  # 当前 public/ 下的稳定静态文件。它们没有 Next 内容哈希文件名，
  # 因此浏览器缓存时间应短于 /_next/static/。
  location ~* ^/(logo\.svg|avatar\.avif|blog-cover-fallback\.svg)$ {
    access_log off;
    proxy_pass http://fuxiaochen_next;

    proxy_hide_header Cache-Control;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
  }

  # 爬虫会频繁访问这些文件，但后台发布、编辑、删除内容后 sitemap
  # 可能变化。短缓存能降低爬虫流量，又不会让搜索引擎长期拿到旧内容。
  location ~* ^/(robots\.txt|sitemap(?:-\d+)?\.xml|server-sitemap\.xml)$ {
    proxy_pass http://fuxiaochen_next;

    proxy_hide_header Cache-Control;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "public, max-age=300, must-revalidate" always;
  }

  # API 包含 Better Auth、后台 CRUD、评论、点赞和浏览统计等状态链路。
  # 这些响应不能被浏览器或代理缓存。
  location ^~ /api/ {
    proxy_pass http://fuxiaochen_next;

    proxy_hide_header Cache-Control;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "no-store" always;
  }

  # 登录页和后台页面依赖当前会话。即使页面由 Next 渲染，也应保持私有且不缓存。
  location ~ ^/(admin(?:/.*)?|login|register)/?$ {
    proxy_pass http://fuxiaochen_next;

    proxy_hide_header Cache-Control;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control "private, no-store" always;
  }

  # 公开页面兜底交给 Next 处理。页面级缓存头由 Next 决定，
  # 不要把 /_next/static/ 的长期缓存策略套到这里。
  location / {
    proxy_pass http://fuxiaochen_next;
  }
}
