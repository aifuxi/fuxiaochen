services:
  app:
    image: fuxiaochen:latest
    container_name: fuxiaochen
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_HOST=postgresql
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=123456
      - DATABASE_DBNAME=fuxiaochen
      - DATABASE_NAME=fuxiaochen
      - DATABASE_URL=postgresql://postgres:123456@postgresql:5432/fuxiaochen
      - DATABASE_MAX_CONNECTIONS=3
      - REDIS_URL=redis://redis:6379
    networks:
      - fuxiaochen-network
    depends_on:
      - postgresql
      - redis

  postgresql:
    image: postgres:17
    container_name: postgresql
    restart: unless-stopped
    ports:
      - "5400:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=fuxiaochen
      - TZ=Asia/Shanghai
      - PGTZ=Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: postgres -c timezone=Asia/Shanghai
    networks:
      - fuxiaochen-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - fuxiaochen-network

networks:
  fuxiaochen-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
